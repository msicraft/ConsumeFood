# config
###############
#   Command   #
###############
# /hunger <player> <amount>           description: Set Player FoodLevel
# /saturation <player> <amount>       description:  Set Player Saturation
# /consumefoodreload                  description:  Reloaded Consume Food Plugin Config
###############
###############
#  permission #    All permissions default to op
###############
# consumefood.sethunger               description: Allow [Consume Food] Plugin Hunger Command
# consumefood.setsaturation           description: Allow [Consume Food] Plugin Saturation Command
# consumefood.reload                  description: Allow [Consume Food] Plugin Config reload Command
###############
###############
#    config   #
###############
# Set FoodLevel and Saturation values
# default value = minecraft value
#
# If you set Enabled to true in MaxSetting you can change the player's maximum FoodLevel and Saturation
# MaxSetting default value
# MaxSetting:
#   Enable = true
#   FoodLevel = 20
#   Saturation = 20.0
#
# If you set Enabled to false in MaxSetting, the maximum value of FoodLevel and Saturation is 20.
# If the value exceeds 20, the maximum value is applied.
# FoodLevel is applied as an integer value (ex. A value of 4.5 is applied as 4)


MaxSetting:
  Enabled: true
  FoodLevel: 20
  Saturation: 20.0

